<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="planetGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#E0AAFF"/>
      <stop offset="55%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#2E0854"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF69B4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF69B4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="80" cy="80" r="70" fill="url(#glow)"/>

  <!-- twinkling background dots -->
  <circle cx="18" cy="30" r="1.4" fill="#8FFFF5"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="140" cy="45" r="1.6" fill="#FF9CEE"><animate attributeName="opacity" values="0.15;1;0.15" dur="2.8s" begin="0.6s" repeatCount="indefinite"/></circle>
  <circle cx="25" cy="130" r="1.3" fill="#FFFFFF"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="135" cy="120" r="1.5" fill="#E0AAFF"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" begin="1.6s" repeatCount="indefinite"/></circle>

  <!-- orbit ring -->
  <ellipse cx="80" cy="80" rx="65" ry="22" fill="none" stroke="#00CED1" stroke-opacity="0.55" stroke-width="1.5" transform="rotate(-18 80 80)"/>

  <!-- planet -->
  <circle cx="80" cy="80" r="30" fill="url(#planetGrad)"/>
  <ellipse cx="70" cy="70" rx="10" ry="6" fill="#F3EEFF" opacity="0.25"/>

  <!-- orbiting moon -->
  <g transform="rotate(-18 80 80)">
    <circle r="5" fill="#8FFFF5">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 80 80 m -65 0 a 65 22 0 1 0 130 0 a 65 22 0 1 0 -130 0" rotate="0"/>
    </circle>
  </g>
</svg>
